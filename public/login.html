<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — Web 文件管理器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 90%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }

    .login-logo {
      text-align: center; font-size: 2.5rem; margin-bottom: 8px;
    }

    .login-title {
      text-align: center; font-size: 1.3rem; font-weight: 700;
      color: #1d1d1f; margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block; font-size: .85rem; font-weight: 600;
      color: #3a3a3c; margin-bottom: 6px;
    }

    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: .95rem; outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus { border-color: #0071e3; }

    .btn-login {
      width: 100%; padding: 12px;
      background: #0071e3; color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s;
      margin-top: 6px;
    }

    .btn-login:hover { background: #0077ed; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      color: #ff3b30; font-size: .85rem; text-align: center;
      margin-top: 14px; min-height: 1.2em;
    }

    .footer-text {
      text-align: center; font-size: .75rem; color: #aaa;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📁</div>
    <div class="login-title">Web 文件管理器</div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">账号</label>
        <input id="username" type="text" placeholder="请输入账号" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">登 录</button>
    </form>

    <div class="error-msg" id="error-msg"></div>
    <div class="footer-text">修改 config.json 可更改账号密码</div>
  </div>

  <script>
    // If already logged in, redirect to main page
    fetch('/api/auth').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/';
    }).catch(() => {});

    // Apply theme from server config
    fetch('/api/theme').then(r => r.json()).then(cfg => {
      if (cfg.primary) {
        document.documentElement.style.setProperty('--login-primary', cfg.primary);
        document.querySelector('.btn-login').style.background = cfg.primary;
        document.querySelector('body').style.background = `linear-gradient(135deg, ${cfg.primary} 0%, ${cfg.primary}cc 100%)`;
      }
      if (cfg.logoText) {
        document.querySelector('.login-title').textContent = cfg.logoText;
        document.title = `登录 — ${cfg.logoText}`;
      }
    }).catch(() => {});

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btnLogin = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      btnLogin.disabled = true;
      btnLogin.textContent = '登录中…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || '登录失败';
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请重试';
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = '登 录';
      }
    });

    // Enter key on password field submits form
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
